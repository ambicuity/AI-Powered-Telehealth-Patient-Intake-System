version: '3.8'

services:
  # Database
  mysql:
    image: mysql:8.0
    container_name: telehealth_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: telehealth_db
      MYSQL_USER: telehealth_user
      MYSQL_PASSWORD: telehealth_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ops/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - telehealth_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: telehealth_redis
    ports:
      - "6379:6379"
    networks:
      - telehealth_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LocalStack for AWS services simulation
  localstack:
    image: localstack/localstack:latest
    container_name: telehealth_localstack
    environment:
      SERVICES: s3,ssm
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - "./ops/localstack:/etc/localstack/init/ready.d"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - telehealth_network

  # Laravel Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: telehealth_backend
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:${LARAVEL_APP_KEY:-YourBase64EncodedAppKeyHere==}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: telehealth_db
      DB_USERNAME: telehealth_user
      DB_PASSWORD: telehealth_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: telehealth-uploads
      AWS_ENDPOINT: http://localstack:4566
      ML_SERVICE_URL: http://ml-service:8001
      QUEUE_CONNECTION: redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    networks:
      - telehealth_network
    command: >
      sh -c "composer install &&
             php artisan key:generate --ansi &&
             php artisan migrate:fresh --seed &&
             php artisan serve --host=0.0.0.0 --port=8000"

  # ML Service (Python FastAPI)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile.dev
    container_name: telehealth_ml
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
      TESSERACT_CMD: /usr/bin/tesseract
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app
    networks:
      - telehealth_network
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8001

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: telehealth_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_APP_NAME: Telehealth AI Intake
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - telehealth_network
    command: npm run dev

volumes:
  mysql_data:
  backend_vendor:
  frontend_node_modules:

networks:
  telehealth_network:
    driver: bridge